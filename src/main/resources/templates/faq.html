<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">FAQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link active" th:href="@{/faq}">FAQ</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="fw-bold mb-4" th:text="${pageTitle}">Часто задаваемые вопросы</h1>

    <div class="accordion" id="faqAccordion">
        <div class="accordion-item" th:each="faq, iterStat : ${faqList}">
            <h2 class="accordion-header" th:id="'heading' + ${iterStat.index}">
                <button class="accordion-button" type="button"
                        th:classappend="${iterStat.index > 0 ? 'collapsed' : ''}"
                        data-bs-toggle="collapse"
                        th:data-bs-target="'#collapse' + ${iterStat.index}"
                        th:aria-controls="'collapse' + ${iterStat.index}">
                    <span th:text="${faq.question}">Вопрос</span>
                </button>
            </h2>
            <div th:id="'collapse' + ${iterStat.index}"
                 class="accordion-collapse collapse"
                 th:classappend="${iterStat.index == 0 ? 'show' : ''}"
                 th:aria-labelledby="'heading' + ${iterStat.index}">
                <div class="accordion-body">
                    <span th:text="${faq.answer}">Ответ</span>
                </div>
            </div>
        </div>
    </div>

    <a class="btn btn-outline-primary mt-4" th:href="@{/}">
        Вернуться на главную
    </a>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
