<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявки | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        .status-badge {
            padding: 0.35em 0.65em;
            border-radius: 0.375rem;
            font-weight: 500;
        }
        .status-NEW { background-color: #0d6efd; color: white; }
        .status-IN_PROGRESS { background-color: #fd7e14; color: white; }
        .status-RESOLVED { background-color: #198754; color: white; }
        .table tbody tr:hover {
            background-color: rgba(13, 110, 253, 0.05);
            transition: background-color 0.2s;
        }
    </style>
</head>
<body class="bg-light">

<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Help Desk</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link active" href="/tickets">Все заявки</a>
                <a class="nav-link" href="/tickets/new">Новые</a>
                <a class="nav-link" href="/tickets/customer">По клиенту</a>
                <a class="nav-link" href="/about">О нас</a>
                <a class="nav-link" href="/contacts">Контакты</a>
            </div>
        </div>
    </div>
</nav>

<!-- Основное содержимое -->
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1" th:text="${pageTitle} ?: 'Список заявок'">
                Список заявок
            </h1>
            <p class="text-muted mb-0">
                Данные загружаются из H2 Database через Spring Data JPA
            </p>
        </div>
        <span class="badge bg-secondary fs-6 px-3 py-2"
              th:text="${#lists.size(tickets)} + ' заявок'">
            0 заявок
        </span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3" style="width: 70px">ID</th>
                        <th>Тема</th>
                        <th style="width: 180px">Пользователь</th>
                        <th style="width: 120px">Статус</th>
                        <th style="width: 200px">Дата создания</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td class="ps-3 fw-semibold" th:text="${ticket.id}">1</td>
                        <td>
                            <strong th:text="${ticket.title}">Тема заявки</strong>
                            <div class="small text-muted mt-1"
                                 th:text="${ticket.description}">
                                Описание заявки
                            </div>
                        </td>
                        <td>
                            <span th:text="${ticket.customerName}">Клиент</span>
                        </td>
                        <td>
                                <span class="status-badge"
                                      th:classappend="'status-' + ${ticket.status.name()}"
                                      th:text="${ticket.status.name()}">
                                    NEW
                                </span>
                        </td>
                        <td>
                                <span th:text="${#temporals.format(ticket.createdAt, 'dd.MM.yyyy HH:mm')}">
                                    01.01.2024 12:00
                                </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tickets)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                                 fill="currentColor" class="bi bi-inbox mb-3" viewBox="0 0 16 16">
                                <path d="M4.98 4a.5.5 0 0 0-.39.188L1.54 8H6a.5.5 0 0 1 .5.5 1.5 1.5 0 1 0 3 0A.5.5 0 0 1 10 8h4.46l-3.05-3.812A.5.5 0 0 0 11.02 4H4.98z"/>
                                <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm15 0a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v.5h14V4z"/>
                            </svg>
                            <br>Нет заявок для отображения
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
